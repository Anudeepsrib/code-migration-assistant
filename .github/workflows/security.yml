name: Security Audit

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit
        
    - name: Run Bandit (Static Analysis)
      run: |
        bandit -r src/code_migration -c pyproject.toml

    - name: Run Pip Audit (Vulnerabilities)
      run: |
        # Generate fully resolved requirements from pyproject/poetry locally or just use pip-audit
        pip install -r requirements.txt
        pip-audit
        
    - name: Run Gitleaks (Secrets Detection)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
